<section id="rsvp" class="rsvp-section">

  <!-- Background texture -->
  <div class="rsvp-bg" parallax [parallaxSpeed]="0.1"></div>

  <div class="rsvp-inner">

    <div class="section-header" reveal>
      <span class="section-eyebrow">{{ lang.t().rsvpEyebrow }}</span>
      <h2 class="section-title">{{ lang.t().rsvpTitle }}</h2>
      <div class="section-divider"></div>
      <p class="section-subtitle">{{ lang.t().rsvpSubtitle }}</p>
    </div>

    <div class="rsvp-card" reveal="200ms" revealType="scale">

      <!-- Corner accents -->
      <span class="corner-accent ca-tl"></span>
      <span class="corner-accent ca-tr"></span>
      <span class="corner-accent ca-bl"></span>
      <span class="corner-accent ca-br"></span>

      <form class="rsvp-form" (submit)="onSubmit($event)">

        <div class="form-group">
          <label for="rsvp-name" class="form-label">{{ lang.t().rsvpNameLabel }}</label>
          <input type="text" id="rsvp-name" name="name" class="form-input"
            [placeholder]="lang.t().rsvpNamePlaceholder" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="rsvp-attendance" class="form-label">{{ lang.t().rsvpAttendingLabel }}</label>
            <div class="select-wrap">
              <select id="rsvp-attendance" name="attendance" class="form-select" required>
                <option value="" disabled selected>{{ lang.t().rsvpAttendingPlaceholder }}</option>
                <option value="yes">{{ lang.t().rsvpAccept }}</option>
                <option value="no">{{ lang.t().rsvpDecline }}</option>
              </select>
              <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" />
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="rsvp-guests" class="form-label">{{ lang.t().rsvpGuestsLabel }}</label>
            <input type="number" id="rsvp-guests" name="guests" min="1" max="6" class="form-input" placeholder="1">
          </div>
        </div>

        <div class="form-group">
          <label for="rsvp-dietary" class="form-label">{{ lang.t().rsvpWishesLabel }}</label>
          <textarea id="rsvp-dietary" name="dietary" rows="3" class="form-textarea"
            [placeholder]="lang.t().rsvpWishesPlaceholder"></textarea>
        </div>

        <div class="form-footer">
          <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            <span class="btn-text">{{ isSubmitting ? lang.t().rsvpSending : lang.t().rsvpSend }}</span>
            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" />
            </svg>
          </button>
          <p class="form-note">{{ lang.t().rsvpNote }}</p>
        </div>

      </form>
    </div>
  </div>
</section>
