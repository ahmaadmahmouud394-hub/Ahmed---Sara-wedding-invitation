<section id="rsvp" class="rsvp-section">

  <!-- Background texture -->
  <div class="rsvp-bg" parallax [parallaxSpeed]="0.1"></div>

  <div class="rsvp-inner">

    <div class="section-header" reveal>
      <span class="section-eyebrow">Join the Celebration</span>
      <h2 class="section-title">RSVP</h2>
      <div class="section-divider"></div>
      <p class="section-subtitle">Kindly respond by 24th June, 2026</p>
    </div>

    <div class="rsvp-card" reveal="200ms" revealType="scale">

      <!-- Corner accents -->
      <span class="corner-accent ca-tl"></span>
      <span class="corner-accent ca-tr"></span>
      <span class="corner-accent ca-bl"></span>
      <span class="corner-accent ca-br"></span>

      <form class="rsvp-form" (submit)="onSubmit($event)">

        <div class="form-group">
          <label for="rsvp-name" class="form-label">Full Name(s)</label>
          <input type="text" id="rsvp-name" name="name" class="form-input" placeholder="e.g. John &amp; Jane Doe" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="rsvp-attendance" class="form-label">Attending?</label>
            <div class="select-wrap">
              <select id="rsvp-attendance" name="attendance" class="form-select" required>
                <option value="" disabled selected>Please choose…</option>
                <option value="yes">Joyfully Accept</option>
                <option value="no">Regretfully Decline</option>
              </select>
              <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/></svg>
            </div>
          </div>

          <div class="form-group">
            <label for="rsvp-guests" class="form-label">Number of Guests</label>
            <input type="number" id="rsvp-guests" name="guests" min="1" max="6" class="form-input" placeholder="1">
          </div>
        </div>

        <div class="form-group">
          <label for="rsvp-dietary" class="form-label">Dietary Requirements / Notes</label>
          <textarea id="rsvp-dietary" name="dietary" rows="3" class="form-textarea" placeholder="Any allergies or special requests?"></textarea>
        </div>

        <div class="form-footer">
          <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            <span class="btn-text">{{ isSubmitting ? 'Sending…' : 'Send RSVP' }}</span>
            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/></svg>
          </button>
          <p class="form-note">Your response helps us plan a perfect celebration</p>
        </div>

      </form>
    </div>
  </div>
</section>
