<section class="hero-section">

  <!-- Animated background layers -->
  <div class="hero-bg">
    <div class="hero-bg-gradient"></div>
    <div class="hero-bg-dots"></div>
    <div class="hero-orb orb-1" parallax [parallaxSpeed]="-0.3"></div>
    <div class="hero-orb orb-2" parallax [parallaxSpeed]="0.2"></div>
  </div>

  <!-- Floating petals -->
  <div class="hero-petals" aria-hidden="true">
    <span class="petal petal-a"></span>
    <span class="petal petal-b"></span>
    <span class="petal petal-c"></span>
    <span class="petal petal-d"></span>
    <span class="petal petal-e"></span>
    <span class="petal petal-f"></span>
  </div>

  <!-- Corner flourishes -->
  <div class="flourish flourish-tl"></div>
  <div class="flourish flourish-tr"></div>
  <div class="flourish flourish-bl"></div>
  <div class="flourish flourish-br"></div>

  <div class="hero-content">

    <p class="hero-eyebrow" reveal>Together with their families</p>

    <div class="hero-names" reveal="200ms">
      <h1 class="hero-name name-shimmer">Ahmed</h1>
      <div class="hero-ampersand-wrap">
        <span class="hero-line"></span>
        <span class="hero-ampersand">&amp;</span>
        <span class="hero-line"></span>
      </div>
      <h1 class="hero-name name-shimmer">Sara</h1>
    </div>

    <p class="hero-request" reveal="350ms">Request the honour of your presence<br>at their wedding celebration</p>

    <div class="hero-meta" reveal="450ms">
      <div class="hero-meta-item">
        <span class="meta-label">Date</span>
        <span class="meta-value">Friday, July 24th, 2026</span>
      </div>
      <div class="hero-meta-divider"></div>
      <div class="hero-meta-item">
        <span class="meta-label">Time</span>
        <span class="meta-value">9:20 PM Onwards</span>
      </div>
    </div>

    <!-- Scroll down indicator -->
    <div class="scroll-down-hint" aria-label="Scroll down">
      <span class="scroll-label">Scroll</span>
      <div class="scroll-arrow-wrap">
        <span class="scroll-arrow-dot"></span>
        <span class="scroll-chevron">&#8964;</span>
      </div>
    </div>

  </div>


</section>
