<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Outer circle (seal base) -->
  <circle cx="256" cy="256" r="240" fill="#1A2E22"/>

  <!-- Inner dashed ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#C8973A" stroke-width="2"
    stroke-dasharray="10,8" opacity="0.7"/>

  <!-- Compass petals (top, bottom, left, right) -->
  <!-- Top petal -->
  <ellipse cx="256" cy="90" rx="16" ry="28" fill="#C8973A"/>
  <!-- Bottom petal -->
  <ellipse cx="256" cy="422" rx="16" ry="28" fill="#C8973A"/>
  <!-- Left petal -->
  <ellipse cx="90" cy="256" rx="28" ry="16" fill="#C8973A"/>
  <!-- Right petal -->
  <ellipse cx="422" cy="256" rx="28" ry="16" fill="#C8973A"/>

  <!-- Diamond accents (45deg rotated squares) -->
  <rect x="240" y="140" width="32" height="32" rx="2" fill="#C8973A"
    transform="rotate(45 256 156)" opacity="0.85"/>
  <rect x="240" y="340" width="32" height="32" rx="2" fill="#C8973A"
    transform="rotate(45 256 356)" opacity="0.85"/>
  <rect x="140" y="240" width="32" height="32" rx="2" fill="#C8973A"
    transform="rotate(45 156 256)" opacity="0.85"/>
  <rect x="340" y="240" width="32" height="32" rx="2" fill="#C8973A"
    transform="rotate(45 356 256)" opacity="0.85"/>

  <!-- Monogram text: A -->
  <text x="256" y="215" font-family="Georgia, 'Times New Roman', serif"
    font-size="88" font-weight="500" fill="#E8C060"
    text-anchor="middle" dominant-baseline="middle">A</text>

  <!-- Ampersand -->
  <text x="256" y="272" font-family="Georgia, 'Times New Roman', serif"
    font-size="48" font-style="italic" fill="#C8973A"
    text-anchor="middle" dominant-baseline="middle">&amp;</text>

  <!-- S -->
  <text x="256" y="328" font-family="Georgia, 'Times New Roman', serif"
    font-size="88" font-weight="500" fill="#E8C060"
    text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- Wax drip feet at bottom -->
  <ellipse cx="230" cy="500" rx="14" ry="10" fill="#1A2E22"/>
  <ellipse cx="256" cy="506" rx="18" ry="12" fill="#1A2E22"/>
  <ellipse cx="282" cy="500" rx="14" ry="10" fill="#1A2E22"/>
</svg>
