<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ahmed &amp; Sara | Wedding Invitation · 24.07.2026</title>
  <script>
    // GitHub Pages SPA redirect — custom domain served from root
    var segmentCount = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
